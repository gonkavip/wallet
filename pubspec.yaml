name: gonka_wallet
description: "Gonka blockchain wallet"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  bip39: ^1.0.6
  bip32: ^2.0.0
  pointycastle: ^3.9.1
  bech32: ^0.2.2
  hex: ^0.2.0
  convert: ^3.1.0
  crypto: ^3.0.6
  protobuf: ^3.1.0
  fixnum: ^1.1.0

  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  no_screenshot: ^0.3.0
  root_jailbreak_sniffer: ^1.1.3

  dio: ^5.7.0

  flutter_riverpod: ^2.6.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  go_router: ^14.6.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
